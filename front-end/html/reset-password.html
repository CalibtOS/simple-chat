<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Reset password – Chatty</title>
    <link rel="stylesheet" href="../css/auth.css">
</head>
<body>
    <div class="box">
        <h1>Set new password</h1>
        <p class="error"  id="errorBox"></p>
        <p class="success" id="successBox"></p>
        <form id="resetForm">
            <label for="password">New password</label>
            <input type="password" id="password" name="password" required minlength="6" autocomplete="new-password">
            <label for="confirm">Confirm new password</label>
            <input type="password" id="confirm" name="confirm" required minlength="6" autocomplete="new-password">
            <button type="submit" id="submitBtn">Update password</button>
        </form>
        <p class="links"><a href="login.html">Back to log in</a></p>
    </div>
    <script type="module" src="../js/reset-password.js"></script>
</body>
</html>
