<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Forgot password – Chatty</title>
    <link rel="stylesheet" href="../css/auth.css">
</head>
<body>
    <div class="box">
        <h1>Forgot password</h1>
        <p class="error"  id="errorBox"></p>
        <p class="success" id="successBox"></p>
        <form id="forgotForm">
            <label for="email">Your account email</label>
            <input type="email" id="email" name="email" required autocomplete="email">
            <button type="submit" id="submitBtn">Send reset link</button>
        </form>
        <p class="links"><a href="login.html">Back to log in</a></p>
    </div>
    <script type="module" src="../js/forgot-password.js"></script>
</body>
</html>
